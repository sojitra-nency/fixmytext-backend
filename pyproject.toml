[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
# E/W: pycodestyle  F: pyflakes  I: isort  B: bugbear  UP: pyupgrade
# C4: flake8-comprehensions  SIM: flake8-simplify
select = ["E", "W", "F", "I", "B", "UP", "C4", "SIM"]
ignore = [
    "E501",   # line-too-long — handled by formatter
    "B008",   # do-not-perform-function-call-in-default-argument (FastAPI Depends pattern)
    "UP007",  # use-x-or-y-for-union — X | Y syntax requires runtime support we control
    "SIM108", # ternary-operator — sometimes less readable
]

[tool.ruff.lint.per-file-ignores]
# SQLAlchemy ORM models use string forward references in Mapped["Type"] annotations.
# These resolve via the mapper registry at runtime — F821 (undefined name) is expected.
"app/db/models/*.py" = ["F821"]
# Test files: allow assert statements and magic values
"tests/**/*.py" = ["S101", "S105", "S106"]
# Alembic migrations: allow unused imports (SA types imported for column definitions)
"alembic/versions/*.py" = ["F401"]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
